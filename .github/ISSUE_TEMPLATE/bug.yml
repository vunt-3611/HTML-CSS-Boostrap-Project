name: "[Bug]"
description: Báo cáo lỗi trong ứng dụng
labels: ["type:bug", "type:devtask"]
body:
  - type: textarea
    id: description
    attributes:
      label: 🐛 Bug Description
      description: Mô tả ngắn gọn bug là gì
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔁 Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 🎯 Expected Behavior

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior

  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Screenshots / Logs

  - type: textarea
    id: environment
    attributes:
      label: 🌍 Environment
      value: |
        - Branch / Version:
        - Device / Browser:
        - OS:
