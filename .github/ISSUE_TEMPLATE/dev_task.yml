name: "[Dev Task]"
description: Task phát triển tính năng mới
labels: ["type:devtask"]
body:
  - type: textarea
    id: description
    attributes:
      label: 📌 Description
      description: Mô tả ngắn gọn task này làm gì và tại sao cần làm
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: ✅ Acceptance Criteria
      description: Liệt kê các tiêu chí hoàn thành
      value: |
        - [ ] Criteria 1
        - [ ] Criteria 2
        - [ ] Criteria 3

  - type: textarea
    id: references
    attributes:
      label: 🔗 References
      description: "Link design, API spec, issue liên quan"

  - type: textarea
    id: technical_notes
    attributes:
      label: ⚙️ Technical Notes
      description: Hướng tiếp cận kỹ thuật, edge cases cần lưu ý

  - type: textarea
    id: notes
    attributes:
      label: 📝 Notes (tuỳ chọn)
      description: Thông tin thêm, edge case cần lưu ý, hoặc gợi ý cách làm
